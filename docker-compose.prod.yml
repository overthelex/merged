services:
  landing:
    image: ghcr.io/overthelex/merged-landing:latest
    container_name: merged-landing
    restart: unless-stopped
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # portal:
  #   image: ghcr.io/overthelex/merged-portal:latest
  #   container_name: merged-portal
  #   restart: unless-stopped
  #   env_file: /home/ubuntu/merged/.env.portal
  #   expose:
  #     - "3000"
  #   depends_on:
  #     - postgres
  #     - redis

  caddy:
    image: caddy:2-alpine
    container_name: merged-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ubuntu/merged/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /var/log/caddy:/var/log/caddy
    depends_on:
      - landing

volumes:
  caddy_data:
  caddy_config:
