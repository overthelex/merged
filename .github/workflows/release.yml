name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Serialize runs so concurrent merges don't race on the same version number.
# Without this, two PRs merging within seconds both read the same package.json
# version, both calculate the same bump, and the second one's `gh release create`
# fails with HTTP 422 "Release.tag_name already exists".
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.title, 'chore: bump version') &&
      !startsWith(github.event.pull_request.title, 'chore: release packages')
    runs-on: [self-hosted, merged]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_LABELS="${{ join(github.event.pull_request.labels.*.name, ' ') }}"
          if echo "$PR_LABELS $PR_TITLE" | grep -iqE 'major|breaking'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$PR_LABELS $PR_TITLE" | grep -iqE 'feat|feature|minor'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Get current version
        id: current
        # Read the latest published tag, not package.json at the PR's merge commit.
        # The merge commit is stale: after a previous queued Release run bumps
        # main to vX, this run's checkout still sees the pre-bump package.json
        # and would recompute the same vX, colliding on tag creation.
        run: |
          git fetch --tags --force origin
          VERSION=$(git tag -l 'v*.*.*' --sort=-v:refname | head -1 | sed 's/^v//')
          if [ -z "$VERSION" ]; then
            VERSION=$(jq -r .version package.json)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: new
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "version=${major}.${minor}.${patch}" >> $GITHUB_OUTPUT

      - name: Open version-bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.new.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          # Include short SHA in branch name so retries never collide with
          # stale remote branches from earlier failed runs.
          BRANCH="chore/bump-v${VERSION}-${SHORT_SHA}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Branch off the tip of main, not this PR's merge commit. An earlier
          # queued Release run may have already landed a bump on main; basing
          # the new bump branch on the stale merge commit would cause a squash
          # conflict on package.json.
          git fetch origin main
          git checkout -b "$BRANCH" origin/main

          # Apply the version bump on top of fresh main.
          jq '.version = "'"$VERSION"'"' package.json > tmp.json && mv tmp.json package.json

          # Close any stale bump PRs for the same version (e.g. previous failed runs).
          gh pr list \
            --search "chore: bump version to v${VERSION} in:title is:open" \
            --json number \
            --jq '.[].number' \
            | xargs -r -n1 -I{} gh pr close {} --delete-branch || true

          git add package.json
          git commit -m "chore: bump version to v${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create --base main --head "$BRANCH" \
            --title "chore: bump version to v${VERSION}" \
            --body "Automated version bump after #${{ github.event.pull_request.number }} (${{ steps.bump.outputs.type }}): ${{ steps.current.outputs.version }} → ${VERSION}"
          gh pr merge "$BRANCH" --squash --delete-branch

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release-notes.md << 'NOTES_EOF'
          ## What's Changed

          **PR:** #${{ github.event.pull_request.number }} by @${{ github.event.pull_request.user.login }}
          **Version bump:** ${{ steps.current.outputs.version }} → ${{ steps.new.outputs.version }} (${{ steps.bump.outputs.type }})
          NOTES_EOF
          gh release create "v${{ steps.new.outputs.version }}" \
            --title "v${{ steps.new.outputs.version }}" \
            --notes-file /tmp/release-notes.md \
            --target main
